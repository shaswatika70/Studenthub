<!DOCTYPE html>
<html>

<head>
    <title>StudentHub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            margin-top: 60px;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            color: #0d6efd;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #0d6efd;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #084298;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🎓 StudentHub</h1>

        <h3>Student Registration Portal</h3>

        <p>Welcome to StudentHub deployed on AWS using Flask, Docker, ECS, ECR and CodePipeline.</p>

        <form method="POST" action="/register">

            <input type="text" name="name" placeholder="Student Name" required><br>

            <input type="email" name="email" placeholder="Email Address" required><br>

            <input type="text" name="course" placeholder="Course" required><br>

            <button type="submit">Register</button>

        </form>

    </div>

</body>

</html>
